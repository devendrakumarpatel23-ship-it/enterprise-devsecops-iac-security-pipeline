input {
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  if [type] == "application_logs" {
    mutate {
      rename => { "message" => "log_message" }
      add_field => { "[@metadata][index_name]" => "application-logs-%{+YYYY.MM.dd}" }
    }
  }

  if [type] == "security_logs" {
    mutate {
      add_field => { "severity" => "high" }
      add_field => { "[@metadata][index_name]" => "security-logs-%{+YYYY.MM.dd}" }
    }
  }

  if [type] == "audit_logs" {
    mutate {
      add_field => { "audit" => true }
      add_field => { "[@metadata][index_name]" => "audit-logs-%{+YYYY.MM.dd}" }
    }
  }

  # Add timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Parse JSON fields if present
  if [message] {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index_name]}"
    codec => json
  }

  # Also output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
