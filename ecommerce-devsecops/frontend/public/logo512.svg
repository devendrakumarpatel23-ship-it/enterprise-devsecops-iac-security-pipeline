<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" fill="url(#grad1)" rx="100"/>
  
  <!-- Shopping Cart Icon (large) -->
  <g fill="white" transform="translate(128, 128)">
    <!-- Cart body -->
    <path d="M 128 256 L 112 160 L 400 160 L 384 256 Q 384 288 360 288 L 152 288 Q 128 288 128 256 Z" stroke="white" stroke-width="10" fill="none"/>
    
    <!-- Cart handle -->
    <path d="M 160 160 Q 160 80 256 80 Q 352 80 352 160" stroke="white" stroke-width="14" fill="none" stroke-linecap="round"/>
    
    <!-- Items in cart -->
    <circle cx="192" cy="208" r="16" fill="white"/>
    <circle cx="256" cy="208" r="16" fill="white"/>
    <circle cx="320" cy="208" r="16" fill="white"/>
  </g>
  
  <!-- Checkmark for security -->
  <g transform="translate(352, 352)">
    <circle cx="0" cy="0" r="64" fill="#10b981" stroke="white" stroke-width="6"/>
    <path d="M -24 0 L -8 16 L 24 -16" stroke="white" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
