name: DAST & Security Testing

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 0'  # Weekly scan

jobs:
  dast:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
      
      - name: Start backend server
        run: |
          cd backend
          python -m flask run &
        env:
          FLASK_ENV: testing
          MONGODB_URI: mongodb://localhost:27017/ecommerce
      
      - name: Wait for server
        run: sleep 10
      
      - name: Run OWASP ZAP
        uses: zaproxy/action-full-scan@v0.4.0
        with:
          target: 'http://localhost:5000'
          cmd_options: '-a'
      
      - name: Upload ZAP report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: zap-report
          path: report_html.html
        continue-on-error: true

  api-security:
    name: API Security Tests
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install requests
      
      - name: Start backend
        run: |
          cd backend
          python -m flask run &
        env:
          FLASK_ENV: testing
      
      - name: Wait for server
        run: sleep 10
      
      - name: Run security tests
        working-directory: ./backend/tests
        run: python -m pytest unit/test_auth.py -v || true

  sbom-generation:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Backend SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-bom --output format=json --output file=backend-sbom.json backend/requirements.txt
        continue-on-error: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Generate Frontend SBOM
        run: |
          cd frontend
          npm install -g @cyclonedx/npm
          cyclonedx-npm --output-file ../frontend-sbom.json
        continue-on-error: true
      
      - name: Upload SBOMs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: sbom-reports
          path: |
            backend-sbom.json
            frontend-sbom.json
